<div class="technology-section" *ngIf="visibleTechnologies$ | async as techs; else loading">
  <div class="technology-content">
    <div class="tech-grid">
      <div class="card" *ngFor="let tech of techs">
         <h3>{{ tech.title | technologyTranslate }}</h3>
      </div>
    </div>
  </div>

  <div class="pagination-nav">
    <button class="btn-nav" (click)="prevPage()" [disabled]="(currentPage$ | async) === 0">
      Anterior
    </button>

    <span class="page-indicator">Página {{ (currentPage$ | async)! + 1 }}</span>

    <button class="btn-nav"
            (click)="nextPage()"
            [disabled]="((currentPage$ | async)! + 1) * pageSize >= allTechnologies.length">
      Siguiente
    </button>
  </div>
</div>

<ng-template #loading>
  <div class="loader">Conectando con Cabo Cañaveral...</div>
</ng-template>
