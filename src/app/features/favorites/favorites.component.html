<section class="favorites-page">
  <h1>Favoritos</h1>

  <ng-container *ngIf="user; else loginTemplate">

    <div class="favorites-grid" *ngIf="(visibleFavorites$ | async) as favorites; else loading">
      <div class="favorite-card" [routerLink]="getFavoriteLink(favorite)" *ngFor="let favorite of favorites">
        <div class="favorite-image">
          <img
            [src]="favorite.imageUrl || 'assets/images/fondo.jpg'"
            [alt]="favorite.title"
            loading="lazy"
            (error)="onImageError($event)"
          >
        </div>

        <div class="favorite-name">
          <h2>{{ favorite.title }}</h2>
        </div>

        <button class="favorite-remove" type="button" (click)="removeFavoriteSilent(favorite, $event)" [title]="'Eliminar: ' + favorite.title">
          ✕
        </button>
      </div>
    </div>

    <div class="pagination-nav" *ngIf="allFavorites.length > pageSize">
      <button class="btn-nav" (click)="prevPage()" [disabled]="(currentPage$ | async) === 0">
        Anterior
      </button>

      <span class="page-indicator">Página {{ (currentPage$ | async)! + 1 }} de {{ totalPages }}</span>

      <button class="btn-nav"
              (click)="nextPage()"
              [disabled]="((currentPage$ | async)! + 1) * pageSize >= allFavorites.length">
        Siguiente
      </button>
    </div>

    <ng-template #loading>
      <div class="loader">Cargando favoritos...</div>
    </ng-template>

    <p *ngIf="allFavorites.length === 0">Todavía no tienes favoritos. Marca la estrella en una tarjeta para agregarlos.</p>
  </ng-container>

  <ng-template #loginTemplate>
    <p>Debes iniciar sesión para ver y administrar tus favoritos.</p>
    <a routerLink="/login">Iniciar sesión</a>
  </ng-template>
</section>
