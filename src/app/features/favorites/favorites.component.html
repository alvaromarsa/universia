<section class="favorites-page">
  <h1>Favoritos</h1>

  <ng-container *ngIf="user; else loginTemplate">
    <p *ngIf="favorites.length === 0">Todavía no tienes favoritos. Marca la estrella en una tarjeta para agregarlos.</p>

    <div class="favorites-grid" *ngIf="favorites.length > 0">
      <article class="favorite-card" *ngFor="let favorite of favorites">
        <div class="favorite-image">
          <img
            [src]="favorite.imageUrl || 'assets/images/fondo.jpg'"
            [alt]="favorite.title"
            loading="lazy"
            (error)="onImageError($event)"
          >
        </div>

        <div class="favorite-content">
          <span class="favorite-type">{{ favorite.type === 'spacex' ? 'SpaceX' : 'Tecnología' }}</span>
          <h2>{{ favorite.title }}</h2>
          <p>{{ favorite.description }}</p>

          <div class="favorite-actions">
            <a [routerLink]="getFavoriteLink(favorite)">Ver detalle</a>
            <button type="button" (click)="removeFavorite(favorite)">Eliminar</button>
          </div>
        </div>
      </article>
    </div>
  </ng-container>

  <ng-template #loginTemplate>
    <p>Debes iniciar sesión para ver y administrar tus favoritos.</p>
    <a routerLink="/login">Iniciar sesión</a>
  </ng-template>
</section>
