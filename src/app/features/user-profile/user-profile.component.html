<div class="login-universo flex min-h-screen items-center justify-center px-[72px] py-8 sm:px-20 md:px-6">
  <div class="panel-espacial w-full max-w-[calc(100vw-144px)] rounded-2xl border border-blue-500/30 bg-black/40 p-6 shadow-[0_0_50px_rgba(59,130,246,0.2)] backdrop-blur-md sm:max-w-md sm:p-8 md:max-w-lg">

    <div class="text-center mb-10" *ngIf="!isLoggedOut">
      <h2 class="text-4xl font-black text-transparent
                bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 tracking-tighter uppercase">
        Panel de Usuario
      </h2>
      <p class="text-blue-200/60 text-sm mt-2">Información del tripulante</p>
    </div>

    <div *ngIf="!isLoggedOut && (userProfile$ | async) as user" class="space-y-6">
      <div>
        <label class="block text-xs font-bold text-blue-400
                      uppercase mb-2 ml-1 tracking-widest">Nombre del Piloto</label>
        <div *ngIf="!isEditingDisplayName" class="space-y-3">
          <div class="w-full bg-blue-900/20 border border-blue-500/50 rounded-lg py-3 px-4 text-white">
            {{ user.displayName || 'Usuario' }}
          </div>
          <button
            type="button"
            (click)="startDisplayNameEdit(user.displayName || '')"
            class="w-full rounded-lg border border-yellow-400/70 bg-blue-900/20 py-3 px-4 text-sm font-bold uppercase tracking-widest text-yellow-200 transition-all hover:border-yellow-300 hover:text-white">
            Cambiar Nombre de Usuario
          </button>
        </div>

        <div *ngIf="isEditingDisplayName" class="space-y-3">
          <input
            [(ngModel)]="displayNameDraft"
            type="text"
            class="w-full bg-blue-900/20 border border-blue-500/50 rounded-lg py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all"
            placeholder="Nuevo nombre de usuario">

          <div *ngIf="displayNameError" class="text-sm text-red-400">
            {{ displayNameError }}
          </div>

          <button
            type="button"
            (click)="saveDisplayName()"
            [disabled]="isSavingDisplayName"
            class="w-full rounded-lg bg-gradient-to-r from-blue-600 to-blue-500 py-3 px-4 text-sm font-bold uppercase tracking-widest text-white transition-all disabled:opacity-40">
            {{ isSavingDisplayName ? 'Guardando...' : 'Guardar Nombre' }}
          </button>

          <button
            type="button"
            (click)="cancelDisplayNameEdit()"
            [disabled]="isSavingDisplayName"
            class="w-full rounded-lg border border-blue-500/50 bg-transparent py-3 px-4 text-sm font-bold uppercase tracking-widest text-blue-200 transition-all hover:border-blue-400 hover:text-white disabled:opacity-40">
            Cancelar
          </button>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-blue-400
                      uppercase mb-2 ml-1 tracking-widest">Correo Electrónico</label>
        <div class="w-full bg-blue-900/20 border border-blue-500/50 rounded-lg py-3 px-4 text-white">
          {{ user.email }}
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-blue-400
                      uppercase mb-2 ml-1 tracking-widest">Rango</label>
        <div class="w-full bg-blue-900/20 border border-blue-500/50 rounded-lg py-3 px-4 text-white capitalize">
          {{ user.rango || 'Sin rango disponible' }}
        </div>
      </div>

      <div class="text-center mt-6">
        <button (click)="logout()" class="w-full bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500
                    hover:to-red-400 text-white font-bold py-4 rounded-lg shadow-lg transform
                      active:scale-95 transition-all uppercase tracking-widest text-sm">
          Cerrar Sesión
        </button>
      </div>
    </div>

    <div *ngIf="isLoggedOut" class="space-y-6 text-center">
      <p class="text-green-400 text-lg font-semibold">Sesión cerrada con éxito</p>
      <p class="text-blue-200/60 text-sm">Gracias por volar con nosotros</p>
    </div>

    <div *ngIf="isLoggedOut" class="text-center mt-6">
      <button [routerLink]="['/']" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500
                  hover:to-purple-500 text-white font-bold py-4 rounded-lg shadow-lg transform
                    active:scale-95 transition-all uppercase tracking-widest text-sm">
        Volver al Home
      </button>
    </div>
  </div>
</div>
