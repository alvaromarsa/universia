<section class="spacex-view" *ngIf="viewModel$ | async as vm">
	<p class="state-message" *ngIf="vm.loading">Cargando detalle del lanzamiento...</p>

	<div class="spacex-view-content" *ngIf="!vm.loading && vm.launch as launch; else stateTemplate">
		<app-spacex-launch-detail
			[launch]="launch"
			[isFavorite]="vm.isFavorite"
			[launchStatus]="getLaunchStatus(launch.success)"
			[launchStatusClass]="getLaunchStatusClass(launch.success)"
			(favoriteToggled)="toggleFavorite(launch, vm.isFavorite)"
			(backRequested)="goBack()">
		</app-spacex-launch-detail>
	</div>

	<ng-template #stateTemplate>
		<p class="state-message" *ngIf="!vm.loading && vm.error">{{ vm.error }}</p>
	</ng-template>
</section>
