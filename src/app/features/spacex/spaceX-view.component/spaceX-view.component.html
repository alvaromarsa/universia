<section class="spacex-view" *ngIf="launchState$ | async as state">
	<div class="spacex-view-content" *ngIf="state.launch as launch; else stateTemplate">
		<article class="detail-card">
			<div class="detail-media">
				<img
					*ngIf="launch.links.patch.small; else imageFallback"
					class="detail-image"
					[src]="launch.links.patch.small"
					[alt]="launch.name"
					loading="lazy">

				<ng-template #imageFallback>
					<div class="detail-image-fallback">SX</div>
				</ng-template>
			</div>

			<div class="detail-body">
				<h1>{{ launch.name }}</h1>

				<div class="detail-meta">
					<div>
						<span>Fecha</span>
						<strong>{{ launch.date_utc | date:'medium' }}</strong>
					</div>

					<div>
						<span>Estado</span>
						<strong>{{ getLaunchStatus(launch.success) }}</strong>
					</div>

					<div>
						<span>Rocket ID</span>
						<strong>{{ launch.rocket }}</strong>
					</div>

					<div>
						<span>Webcast</span>
						<a *ngIf="launch.links.webcast; else noWebcast" [href]="launch.links.webcast" target="_blank" rel="noreferrer">
							Ver lanzamiento
						</a>
						<ng-template #noWebcast>
							<strong>No disponible</strong>
						</ng-template>
					</div>
				</div>

				<p class="detail-description">{{ launch.details | spacexDescriptionTranslate: launch.id }}</p>
			</div>
		</article>

		<div class="detail-actions">
			<button class="btn-back" type="button" (click)="goBack()">Volver a SpaceX</button>
		</div>
	</div>

	<ng-template #stateTemplate>
		<p class="state-message">{{ state.error }}</p>
	</ng-template>
</section>
