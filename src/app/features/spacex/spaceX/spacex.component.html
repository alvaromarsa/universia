<section class="spacex-section">
	<header class="spacex-header">
		<h1 class="spacex-title">Lanzamientos de SpaceX</h1>
	</header>

	<div class="spacex-content" *ngIf="launchState$ | async as state">
		<p class="spacex-empty" *ngIf="state.loading">Cargando lanzamientos de SpaceX...</p>
		<p class="spacex-error" *ngIf="!state.loading && state.error">{{ state.error }}</p>

		<app-spacex-launch-list
			*ngIf="!state.loading && state.launches.length; else emptyState"
			[launches]="state.launches"
			(launchSelected)="openLaunchDetail($event)">
		</app-spacex-launch-list>

		<ng-template #emptyState>
			<p class="spacex-empty" *ngIf="!state.loading && !state.error">No llegaron lanzamientos desde la API.</p>
		</ng-template>
	</div>
</section>
