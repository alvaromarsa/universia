
<div *ngIf="planetData$ | async as data" class="planet-detail contenedor-universo p-10 universo min-h-screen flex flex-col items-center justify-center">
  <div *ngFor="let p of data" class="w-full max-w-3xl">
    <h1 class="text-6xl font-bold text-orange-500 text-center">{{ p.name | translate}}</h1>
    <div class="flex justify-center my-8">
      <video autoplay muted loop playsinline
            class="planeta-chroma w-full max-w-md"
           [src]="'assets/videos/' + p.id + '.mp4'">
      </video>

    </div>
    <!-- contenedor relativo que permite posicionar la información por encima sin afectar al vídeo -->
    <div class="planet-info grid grid-cols-2 gap-4">
      <p class="text-xl">🪐 Gravedad: {{ p.gravity }} m/s²</p>
      <p class="text-xl">🌑 Lunas: {{ p.moons ? p.moons.length : 0 }}</p>
      <p class="text-xl">🌡️ Temperatura: {{ p.avgTemp }} K</p>
      <p class="text-xl">📏 Radio: {{ p.meanRadius }} km</p>
    </div>
  </div>
</div>
