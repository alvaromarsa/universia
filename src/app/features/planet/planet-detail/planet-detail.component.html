
<div *ngIf="planetData$ | async as data" class="planet-detail contenedor-universo p-10 min-h-screen">
  <div *ngFor="let p of data" class="detail-container w-full">
    <h1 class="detail-title text-6xl font-bold text-blue-400 text-center opacity-0">{{ p.name | translate}}</h1>

    <div class="planet-video-container">
      <div class="planet-video-shell"
           [class.planet-video-shell-saturno]="p.id.toLowerCase() === 'saturne'">
        <video autoplay muted loop playsinline
            webkit-playsinline="true"
          class="planeta-detail-video"
          preload="auto"
          [class.planeta-detail-video-saturno]="p.id.toLowerCase() === 'saturne'"
            (loadedmetadata)="ensureVideoPlayback($event)"
            (canplay)="ensureVideoPlayback($event)"
          [src]="getVideoUrl(p.id)">
        </video>
      </div>
    </div>

    <!-- contenedor de información del planeta -->
    <div class="planet-info grid grid-cols-2 gap-4 opacity-0 text-blue-400">
      <p class="text-xl flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-container" stroke="currentColor" viewBox="0 0 64 64" id="gravity">
          <circle cx="32" cy="32" r="5" fill="#6cc5ef"></circle>

        Gravedad: {{ p.gravity }} m/s²</p>
      <p class="text-xl flex items-center gap-2">
        <img
          src="assets/icons/luna.png"
          alt="Icono Lunas"
          class="icon-container object-contain"
        />

        Lunas: {{ p.moons ? p.moons.length : 0 }}</p>
      <p class="text-xl flex items-center gap-2">
        <img
          src="assets/icons/temperatura.png"
          alt="Icono Temperatura"
          class="icon-container object-contain"
        />

        Temperatura: {{ p.avgTemp | celsius }}</p>

      <p class="text-xl flex items-center gap-2">
        <img
          src="assets/icons/radio.png"
          alt="Icono Radio"
          class="icon-container object-contain"
        />
        Radio: {{ p.meanRadius }} km</p>
    </div>
  </div>
</div>
